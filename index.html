<!DOCTYPE html>
<html>
<head>
    <title>Madrasa Website</title>
    <script>
        let wuduDuration = 5000; // Updated duration for wudu
        let salahDuration = 5500; // Updated duration for salah
        let currentStep = 0;
        const steps = document.querySelectorAll('.step');

        function startAnimation() {
            currentStep = 0;
            steps.forEach(step => step.style.display = 'none');
            steps[currentStep].style.display = 'block';
            scrollToActiveStep();
            nextStep();
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                setTimeout(() => {
                    steps[currentStep].style.display = 'none';
                    currentStep++;
                    steps[currentStep].style.display = 'block';
                    scrollToActiveStep();
                    nextStep();
                }, currentStep < 5 ? wuduDuration : salahDuration);
            }
        }

        function scrollToActiveStep() {
            const activeStep = steps[currentStep];
            activeStep.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</head>
<body>
    <button onclick="startAnimation()">Start</button>
    <div class="scroll-wrapper">
        <div class="step">Wudu Step 1</div>
        <div class="step">Wudu Step 2</div>
        <div class="step">Salah Step 1</div>
        <div class="step">Salah Step 2</div>
    </div>
</body>
</html>
