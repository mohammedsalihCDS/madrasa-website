<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasa Website</title>
    <style>
        /* Your CSS styles here */
    </style>
</head>
<body>
    <div id="wudu-step">Wudu Animation Step</div>
    <div id="salah-step">Salah Animation Step</div>

    <script>
        function displayWuduStep() {
            const wuduStep = document.getElementById('wudu-step');
            wuduStep.style.display = 'block';
            setTimeout(() => { wuduStep.style.display = 'none'; }, 5000);
        }
        function displaySalahStep() {
            const salahStep = document.getElementById('salah-step');
            salahStep.style.display = 'block';
            setTimeout(() => { salahStep.style.display = 'none'; }, 5000);
        }

        // Call the functions with a 5-second interval
        displayWuduStep();
        setTimeout(displaySalahStep, 5000);
    </script>
</body>
</html>
